<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBot — Seu Guia de Filmes</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="filmstrip top" id="strip-top"></div>
<div class="filmstrip bottom" id="strip-bottom"></div>

<div class="page">
    <div class="chat-container">

        <div class="chat-header">
            <div class="avatar">🎬</div>
            <div class="chat-header-name">CornBot</div>
        </div>

        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <span class="input-icon">🔍</span>
                <input type="text" id="user-input" placeholder="Mensagem" autocomplete="off" />
            </div>
            <button class="send-btn" onclick="sendMessage()" title="Enviar">➤</button>
        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
